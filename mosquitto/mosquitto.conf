# Mosquitto Configuration for HydroTrack v3.0
# HiveMQ stand-in for offline development

# General settings
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Allow anonymous connections (dev only)
allow_anonymous true

# MQTT Listener (for backend)
listener 1883
protocol mqtt

# WebSocket Listener (for frontend MQTT.js)
listener 9001
protocol websockets
